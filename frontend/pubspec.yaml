name: flood_rescue_app
description: Flood Rescue Coordination and Relief Management System Frontend

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.3
  flutter_bloc: ^8.1.3
  stomp_dart_client: ^1.0.0
  shared_preferences: ^2.2.1
  cupertino_icons: ^1.0.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  image_picker: ^1.0.7
  http: ^1.1.0
  intl: ^0.19.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
