name: flood_rescue_app
description: Flood Rescue Coordination and Relief Management System Frontend

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Network & State Management
  dio: ^5.3.3
  flutter_bloc: ^8.1.3
  stomp_dart_client: ^1.0.0
  http: ^1.1.0
  
  # Storage & Utilities
  shared_preferences: ^2.2.1
  intl: ^0.19.0
  
  # UI Components & Icons
  cupertino_icons: ^1.0.5
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  
  # Media & Hardware
  image_picker: ^1.0.7
  
  # Data Visualization (Biểu đồ)
  fl_chart: ^0.66.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png