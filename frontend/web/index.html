<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flood_rescue_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>flood_rescue_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    #map { height: 100%; width: 100%; border-radius: 24px; }
    
    .info.legend {
      padding: 10px 14px;
      font: 13px/18px 'Inter', Arial, sans-serif;
      background: white;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      border-radius: 10px;
      color: #333;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .info.legend h4 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      color: #000;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      display: inline-block;
      border: 1px solid white;
    }
    .legend-icon {
      margin-right: 10px;
      font-size: 14px;
      width: 12px;
      text-align: center;
    }

    /* Custom Icons */
    .hazard-marker {
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
    .text-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
    }

    /* Pulsing SOS Marker */
    .sos-pulse-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sos-pulse-dot {
      width: 10px;
      height: 10px;
      background: #ff0000;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.4);
      position: relative;
      z-index: 2;
    }
    .sos-pulse-ring {
      position: absolute;
      width: 10px;
      height: 10px;
      border: 3px solid #ff4444;
      border-radius: 50%;
      animation: pulse-ring 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      z-index: 1;
    }
    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      80%, 100% {
        transform: scale(3.5);
        opacity: 0;
      }
    }
  </style>

  <script>
    function initLeafletMap(container) {
      if (typeof L === 'undefined') {
        console.error("Leaflet (L) is not defined yet.");
        return;
      }
      console.log("Initializing Multi-layer Rescue Map...");
      
      const map = L.map(container || 'map', {
        zoomControl: true,
        maxBounds: [
          [8.0, 102.0], // Southwest
          [24.0, 110.0] // Northeast
        ]
      }).setView([16.06, 108.22], 14); // Detailed focus on Da Nang center

      // Layer 1: Base Map (CartoDB Voyager - Vibrant & Colorful)
      const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20,
        minZoom: 5
      }).addTo(map);

      // Layer 2: Hazard Layer (Currently Empty)
      const hazardLayer = L.layerGroup().addTo(map);

      // Layer 3: Rescue Request Layer (Fetching from API)
      const rescueRequestLayer = L.layerGroup().addTo(map);

      const sosIcon = L.divIcon({
        className: 'sos-pulse-container',
        html: '<div class="sos-pulse-ring"></div><div class="sos-pulse-dot"></div>',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });

      function loadRescueRequests() {
        fetch('http://localhost:8080/api/v1/rescue-requests')
          .then(res => res.json())
          .then(result => {
            if (result.success && result.data) {
              result.data.forEach(r => {
                if (r.locationLat && r.locationLng) {
                  L.marker([r.locationLat, r.locationLng], { icon: sosIcon })
                    .bindPopup(`
                      <strong>Yêu cầu cứu hộ: ${r.customId || 'N/A'}</strong><br>
                      Người dân: ${r.citizenName}<br>
                      Số người: ${r.numberOfPeople}<br>
                      Trạng thái: ${r.status}<br>
                      Mô tả: ${r.description}
                    `).addTo(rescueRequestLayer);
                }
              });
            }
          })
          .catch(err => console.error("Error loading rescue requests:", err));
      }

      // Layer 4: Rescue Team Layer (Currently Empty)
      const rescueTeamLayer = L.layerGroup().addTo(map);

      // Initial Load
      loadRescueRequests();

      // Legend
      const legend = L.control({ position: 'bottomright' });
      legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend');
        div.innerHTML = `
          <h4>Mức cảnh báo lũ lụt</h4>
          <div class="legend-item"><span class="legend-dot" style="background: #ff0000"></span> Nguy hiểm cao – Ngập sâu</div>
          <div class="legend-item"><span class="legend-dot" style="background: #ff9800"></span> Nguy hiểm trung bình – Ngập vừa</div>
          <div class="legend-item"><span class="legend-dot" style="background: #ffeb3b"></span> Ngập nhẹ – Nguy cơ thấp</div>
          <div class="legend-item"><span class="legend-icon">🔴</span> Yêu cầu cứu hộ khẩn cấp</div>
          <div class="legend-item"><span class="legend-icon">🚑</span> Đội cứu hộ</div>
        `;
        return div;
      };
      legend.addTo(map);

      // Fix for container size issues in Flutter/Flexbox
      setTimeout(() => { map.invalidateSize(); }, 500);
    }
  </script>
</head>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
